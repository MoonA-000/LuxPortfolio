<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact • Acme SaaS</title>
  <meta name="description" content="Contact Acme for support or sales.">
  <link rel="icon" href="../assets/logo.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="../index.html" class="brand">
        <img src="../assets/logo.svg" alt="Acme" class="brand-icon" />
        <span class="brand-name">Acme</span>
      </a>
      <nav class="nav">
        <a href="pricing.html" class="nav-link">Pricing</a>
        <a href="contact.html" class="nav-link">Contact</a>
        <a href="#" class="button button-primary">Sign in</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <h1>Contact us</h1>
        <p class="subtitle">We usually respond within one business day.</p>

        <form id="contact-form" class="card" style="max-width:560px">
          <label>
            Name
            <input name="name" required style="display:block;width:100%;padding:10px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--text);margin-top:6px" />
          </label>
          <div style="height:10px"></div>
          <label>
            Email
            <input name="email" type="email" required style="display:block;width:100%;padding:10px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--text);margin-top:6px" />
          </label>
          <div style="height:10px"></div>
          <label>
            Message
            <textarea name="message" rows="5" required style="display:block;width:100%;padding:10px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--text);margin-top:6px"></textarea>
          </label>
          <div style="height:14px"></div>
          <button type="submit" class="button button-primary">Send</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© <span id="year"></span> Acme, Inc.</p>
      <div class="footer-links">
        <a href="privacy.html">Privacy</a>
        <a href="terms.html">Terms</a>
      </div>
    </div>
  </footer>

  <script src="../script.js" defer></script>
</body>
</html>
